<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Persona 3 Reload Style Menu</title>
    <style>
      body {
        margin: 0;
        font-family: "Arial Black", sans-serif;
        /* background: linear-gradient(135deg, #07111f, #0b2d5a, #103d7a); */
        background: rgb(0, 0, 60);
        color: #eaf4ff;
        overflow: hidden;
      }

      .menu {
        position: absolute;
        top: 50%;
        left: 10%;
        transform: translateY(-50%);
      }

      .menu-item {
        font-size: 2.8rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin: 20px 0;
        cursor: pointer;
        transform: skew(-6deg);
        transition: all 0.3s ease;
      }

      .menu-item:hover {
        color: #7fd6ff;
        transform: skew(-6deg) scale(1.08);
        text-shadow: 0 0 12px rgba(127, 214, 255, 0.8);
      }

      .menu-item.active {
        color: red;
      }

      .background-shape {
        position: absolute;
        width: 150%;
        height: 150%;
        background: #4fc3ff;
        transform: rotate(45deg);
        top: -50%;
        left: -50%;
        opacity: 0.08;
        animation: moveBg 10s linear infinite;
      }

      @keyframes moveBg {
        0% {
          transform: rotate(45deg) translateX(0);
        }
        100% {
          transform: rotate(45deg) translateX(200px);
        }
      }
    </style>
  </head>
  <body>
    <div class="background-shape"></div>

    <div class="menu">
      <div class="menu-item active">New Game</div>
      <div class="menu-item">Load Game</div>
      <div class="menu-item">System</div>
      <div class="menu-item">Exit</div>
    </div>

    <script>
      const items = document.querySelectorAll(".menu-item");
      let current = 0;

      function updateActive(index) {
        items.forEach((item) => item.classList.remove("active"));
        items[index].classList.add("active");
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowDown") {
          current = (current + 1) % items.length;
          updateActive(current);
        }
        if (e.key === "ArrowUp") {
          current = (current - 1 + items.length) % items.length;
          updateActive(current);
        }
        if (e.key === "Enter") {
          alert(items[current].innerText + " selected");
        }
      });
    </script>
  </body>
</html>
