<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio - James Warlond</title>
    <style>
      body {
        margin: 0;
        font-family: "Arial Black", sans-serif;
        /* background: linear-gradient(135deg, #07111f, #0b2d5a, #103d7a); */
        background: rgb(0, 0, 60);
        color: #eaf4ff;
        overflow: hidden;
        opacity: 0;
        transition: all 0.5s ease;
      }

      body.loaded {
        opacity: 1;
      }
      body.fade-out {
        opacity: 0;
      }

      .menu {
        position: absolute;
        top: 50%;
        left: 10%;
        transform: translateY(-50%);
      }

      .menu-item {
        font-size: 2.5rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #eaf4ff;
        margin: 25px 0;
        cursor: pointer;
        /*transform: skew(-6deg);*/
        transition: all 0.25s ease;
      }

      .menu-item:hover {
        color: crimson;
        transform: scale(1.1);
        text-shadow: 0 0 6px crimson;
      }

      .background-shape {
        position: absolute;
        width: 150%;
        height: 150%;
        background: rgb(0, 0, 255);
        transform: rotate(45deg);
        top: -50%;
        left: -50%;
        opacity: 0.1;
        /*animation: moveBg 10s linear infinite;*/
      }

      @keyframes moveBg {
        0% {
          transform: rotate(45deg) translateX(0);
        }
        100% {
          transform: rotate(45deg) translateX(200px);
        }
      }
    </style>
  </head>
  <body>
    <div class="background-shape"></div>

    <div class="menu">
      <div class="menu-item" data-page="about.html">About Me</div>
      <div class="menu-item" data-page="ux.html">UX Design Work</div>
      <div class="menu-item">Web Design Work</div>
      <div class="menu-item">Graphic Design Work</div>
      <div class="menu-item">Video Proudction Work</div>
      <div class="menu-item" data-page="song.html">Music Select</div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
