<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio - James Warlond</title>
    <style>
      body {
        margin: 0;
        font-family: "Arial Black", sans-serif;
        background: rgb(0, 0, 60);
        color: #eaf4ff;
        overflow: hidden;
        opacity:0;
        transition: all 0.5s ease;
      }

      body.loaded {
        opacity: 1;
      }
      body.fade-out {
        opacity: 0;
      }

      .menu {
        position: absolute;
        top: 50%;
        left: 10%;
        transform: translateY(-50%);
      }

      .menu-item {
        font-size: 2.5rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #eaf4ff;
        top: 85%;
        left:10%;
        position: fixed;
        cursor:pointer;
        transition: all 0.25s ease;
      }

      .menu-item:hover {
        color: crimson;
        transform: scale(1.1);
        text-shadow: 0 0 6px crimson;
      }

      .header {
        font-size: 2.5rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #eaf4ff;
        top: 5%;
        left:10%;
        position: fixed;
      }

      .info {
        font-size: 1.5rem;
        color: #eaf4ff;
        margin: 20px 0;
        width: 600px;
      }

      .background-shape {
        position: absolute;
        width: 150%;
        height: 150%;
        background: rgb(0, 0, 255);
        transform: rotate(45deg);
        top: -50%;
        left: -50%;
        opacity: 0.1;
      }
    </style>
  </head>
  <body>
    <div class="background-shape"></div>

    <div class="header">About Me</div>
    <div class="menu">
      <div class="info">
        I'm a graphic designer from Melbourne, Australia with versatile skills
        in several other fields including UX/UI design, web design and video
        production! Here's a website featuring some of my best works during my
        time at RMIT University!
      </div>
      </div>
    <div class="menu-item" data-page="index.html">Back</div>
    </div>

    <script src = "script.js"></script>
  </body>
</html>
